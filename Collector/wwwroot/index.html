<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>BODA.CMS — 협동로봇 상태 대시보드</title>
<link rel="icon" href="favicon.ico">
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 24px; background: #14171b; color: #d6e1ec;
         font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  #license { color: #8a93a0; font-size: 13px; margin-bottom: 10px; }
  #toolbar { margin-bottom: 16px; }
  #opMsg { color: #4fc08d; font-size: 12px; margin-left: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card { background: #1b1f24; border: 1px solid #2a2f36; border-radius: 10px; padding: 16px;
          cursor: pointer; }
  .card:hover { border-color: #3a424d; }
  .card.selected { border-color: #4fc08d; }
  .card h2 { font-size: 15px; margin: 0 0 2px; }
  .sub { color: #8a93a0; font-size: 12px; margin-bottom: 10px; }
  .row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .row .k { color: #8a93a0; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
  .Connected { background: #2ea36f; } .Connecting { background: #d99a2b; }
  .Faulted { background: #c94f4f; } .Disconnected { background: #5a6470; }
  .health-good { color: #4fc08d; } .health-warn { color: #e0a836; } .health-bad { color: #e06c6c; }
  .bar { height: 6px; background: #2a2f36; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .bar > div { height: 100%; transition: width .5s; }
  #alerts { margin-top: 24px; }
  #alerts h2 { font-size: 15px; margin-bottom: 6px; }
  #alertMeta { color: #8a93a0; font-size: 12px; font-weight: normal; margin-left: 8px; }
  .chip { display: inline-block; padding: 3px 11px; margin: 0 6px 6px 0; border: 1px solid #2a2f36;
          border-radius: 12px; font-size: 12px; color: #8a93a0; cursor: pointer; user-select: none; }
  .chip:hover { border-color: #3a424d; }
  .chip.on { color: #d6e1ec; border-color: #4fc08d; }
  .alert { font-family: Consolas, monospace; font-size: 12.5px; padding: 2px 0; }
  .Alarm { color: #e06c6c; } .Warning { color: #e0a836; } .Info { color: #4fc08d; }
  #empty { color: #5a6470; }
  #moreBtn { margin-top: 8px; background: none; }
</style>
</head>
<body>
<h1>BODA.CMS — 협동로봇 상태 대시보드</h1>
<div id="license">연결 중…</div>
<div id="toolbar">
  <span class="chip" id="btnRelearn"
        title="CBM 기준선(정상 상태의 평균/편차)을 지금 상태로 다시 학습합니다 — 로봇이 정상 운전 중일 때 누르세요">기준선 재학습</span>
  <span class="chip" id="btnClearAlerts"
        title="활성 알림을 해제하고 알림 목록을 비웁니다 (DB 이력은 보존)">알림 리셋</span>
  <span class="chip" id="btnRestart"
        title="수집기 서비스를 재시작합니다 — 약 10~20초간 수집·대시보드가 중단됩니다">수집기 재시작</span>
  <span id="opMsg"></span>
</div>
<div class="grid" id="cards"></div>
<div id="alerts">
  <h2>알림<span id="alertMeta"></span></h2>
  <div id="chips"></div>
  <div id="alertList"><span id="empty">알림 없음</span></div>
  <button id="moreBtn" class="chip">이전 알림 더 보기</button>
</div>

<script>
function healthClass(score) { return score >= 80 ? 'health-good' : score >= 50 ? 'health-warn' : 'health-bad'; }
function healthColor(score) { return score >= 80 ? '#4fc08d' : score >= 50 ? '#e0a836' : '#e06c6c'; }

// ── 알림 필터 상태: 카드 클릭(로봇/채널)과 칩(심각도)이 같은 상태를 공유한다 ──
const filter = { robot: null, channel: null, severity: null };
let live = true;   // false = "더 보기"로 과거 조회 중 — 목록 자동 갱신 일시정지
let shown = [];    // 현재 목록 (live 첫 페이지 + 더 보기로 이어붙인 과거 페이지)
const SEVERITIES = [[null, '전체'], ['warning,alarm', '경고 이상'], ['alarm', '알람만']];

function alertsUrl(before) {
  const p = new URLSearchParams({ take: 40 });
  if (filter.robot) { p.set('robot', filter.robot); p.set('channel', filter.channel); }
  if (filter.severity) p.set('severity', filter.severity);
  if (before) p.set('before', before);
  return '/api/alerts?' + p;
}

function renderChips() {
  let html = SEVERITIES.map(([v, label]) =>
    `<span class="chip ${filter.severity === v ? 'on' : ''}" data-sev="${v ?? ''}">${label}</span>`).join('');
  if (filter.robot)
    html += `<span class="chip on" data-clear-card>${filter.robot}/${filter.channel} ✕</span>`;
  if (!live)
    html += `<span class="chip on" data-live>▶ 최신으로</span>`;
  document.getElementById('chips').innerHTML = html;
}

function renderAlerts() {
  document.getElementById('alertList').innerHTML = shown.length
    ? shown.map(a => `<div class="alert ${a.severity}">[${new Date(a.atUtc).toLocaleString()}] ` +
        `[${a.robotId}/${a.channel}] ${a.message}</div>`).join('')
    : '<span id="empty">알림 없음</span>';
  document.getElementById('alertMeta').textContent =
    `${shown.length}건 표시` + (live ? '' : ' · 과거 조회 중 (갱신 일시정지)');
}

async function refreshAlerts() {
  shown = await (await fetch(alertsUrl())).json();
  renderAlerts();
}

// 필터가 바뀌면 과거 페이지를 버리고 실시간 첫 페이지부터 다시.
function onFilterChanged() {
  live = true;
  document.getElementById('moreBtn').textContent = '이전 알림 더 보기';
  renderChips();
  refreshAlerts();
}

// 카드 클릭 → 해당 로봇/채널 알림만 (다시 클릭하면 해제)
document.getElementById('cards').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const same = filter.robot === card.dataset.robot && filter.channel === card.dataset.channel;
  filter.robot = same ? null : card.dataset.robot;
  filter.channel = same ? null : card.dataset.channel;
  onFilterChanged();
  refresh();
});

document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  if (chip.dataset.sev !== undefined) { filter.severity = chip.dataset.sev || null; onFilterChanged(); }
  else if ('clearCard' in chip.dataset) { filter.robot = filter.channel = null; onFilterChanged(); refresh(); }
  else if ('live' in chip.dataset) onFilterChanged();
});

document.getElementById('moreBtn').addEventListener('click', async () => {
  live = false;   // 과거를 읽는 동안 목록이 위에서 밀리지 않게 일시정지
  const before = shown.length ? shown[shown.length - 1].atUtc : null;
  const page = await (await fetch(alertsUrl(before))).json();
  if (!page.length) document.getElementById('moreBtn').textContent = '더 이상 없음';
  shown = shown.concat(page);
  renderChips();
  renderAlerts();
});

// ── 운영 버튼: 기준선 재학습 / 알림 리셋 / 수집기 재시작 ──
async function post(url) {
  const r = await fetch(url, { method: 'POST' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
function opMsg(text) {
  const el = document.getElementById('opMsg');
  el.textContent = text;
  setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 8000);
}

document.getElementById('btnRelearn').addEventListener('click', async () => {
  if (!confirm('CBM 기준선을 지금 상태로 다시 학습합니다.\n\n로봇이 "정상 운전 중"일 때 실행해야 합니다 — 정지·웜업 중에 실행하면 그 상태가 기준선이 됩니다.\n(약 1분 학습 후 건강도가 다시 계산됩니다)')) return;
  try { const r = await post('/api/cbm/relearn'); opMsg(`기준선 재학습 시작 — 채널 ${r.channels}개 (약 1분)`); }
  catch (e) { opMsg('실패: ' + e.message); }
});

document.getElementById('btnClearAlerts').addEventListener('click', async () => {
  try {
    await post('/api/alerts/clear');
    opMsg('알림 리셋 완료 — 이전 이력은 DB에 보존됩니다');
    onFilterChanged();
  } catch (e) { opMsg('실패: ' + e.message); }
});

document.getElementById('btnRestart').addEventListener('click', async () => {
  if (!confirm('수집기 서비스를 재시작합니다.\n\n약 10~20초간 수집과 대시보드가 중단되며, 재기동 후 CBM 기준선도 처음부터 다시 학습됩니다.\n(기준선만 다시 잡으려면 "기준선 재학습"이 무중단이라 더 안전합니다)')) return;
  try { await post('/api/service/restart'); opMsg('재시작 중 — 잠시 후 자동으로 복구됩니다'); }
  catch (e) { opMsg('실패: ' + e.message); }
});

async function refresh() {
  try {
    const status = await (await fetch('/api/status')).json();
    document.getElementById('license').textContent =
      status.license.description + ' · 서버시각 ' + new Date(status.serverTimeUtc).toLocaleTimeString();

    document.getElementById('cards').innerHTML = status.channels.map(c => {
      const cbm = c.cbm ?? {};
      const learning = cbm.phase === 'Learning';
      const health = cbm.healthScore ?? 100;
      const cbmLine = learning
        ? `학습 ${Math.round((cbm.learningProgress ?? 0) * 100)}%`
        : `건강도 <b class="${healthClass(health)}">${health}</b>` +
          (cbm.activeAlerts ? ` · 알림 ${cbm.activeAlerts} (${cbm.worst ?? ''})` : '');
      const mlLine = c.ml
        ? (c.ml.scoredWindows > 0
            ? (c.ml.activeAlerts ? `<span class="health-bad">이상 ${c.ml.activeAlerts}건 (${c.ml.worst ?? ''})</span>`
                                 : '<span class="health-good">정상</span>')
            : '대기')
        : '모델 없음';
      const selected = filter.robot === c.robotId && filter.channel === c.channel;
      return `<div class="card${selected ? ' selected' : ''}" data-robot="${c.robotId}" data-channel="${c.channel}"
                   title="클릭하면 이 채널의 알림만 표시">
        <h2><span class="dot ${c.state}"></span>${c.robotId} — ${c.displayName}</h2>
        <div class="sub">${c.vendor}/${c.channel} · ${c.tier} · ${c.state}</div>
        <div class="row"><span class="k">수집률</span><span>${c.rateHz} Hz (누적 ${c.framesTotal.toLocaleString()})</span></div>
        <div class="row"><span class="k">CBM</span><span>${cbmLine}</span></div>
        <div class="row"><span class="k">ML</span><span>${mlLine}</span></div>
        <div class="bar"><div style="width:${learning ? 0 : health}%;background:${healthColor(health)}"></div></div>
      </div>`;
    }).join('');

    if (live) await refreshAlerts();
  } catch (e) {
    document.getElementById('license').textContent = '수집기 연결 실패: ' + e;
  }
}
renderChips();
refresh();
setInterval(refresh, 1000);
</script>
</body>
</html>
